<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SatSang - AI Chat with Sanathana Dharma Scriptures</title>
    <style>
        /* Minimalist & High-Contrast Styling */
        body {
            font-family: Georgia, serif;
            background-color: #ffffff;
            color: #111111;
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 650px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: normal;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            font-style: italic;
            color: #555555;
            margin-bottom: 50px;
            font-size: 1.1rem;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        /* Clean, text-focused button design */
        .scripture-btn {
            display: block;
            width: 100%;
            max-width: 320px;
            padding: 14px 20px;
            font-family: Georgia, serif;
            font-size: 1.1rem;
            color: #111111;
            background-color: #ffffff;
            text-decoration: none;
            border: 1px solid #111111;
            border-radius: 0; /* Sharp, minimalist edges */
            transition: all 0.2s ease-in-out;
            box-sizing: border-box;
        }

        /* Subtle hover effect */
        .scripture-btn:hover {
            background-color: #111111;
            color: #ffffff;
            cursor: pointer;
        }

        footer {
            margin-top: 60px;
            font-size: 0.9rem;
            color: #777777;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SatSang</h1>
        <p class="subtitle">AI Chat With Sanathana Dharma Scriptures</p>

        <div class="button-container">
            <!-- Ramayana Link -->
            <a href="https://notebooklm.google.com/notebook/a05e4397-59a6-4a4a-b3ce-2f02c6fb0318/preview" 
               class="scripture-btn" 
               target="_blank" 
               rel="noopener noreferrer">
                Ramayana
            </a>

            <!-- Srimad Bhagavad Gita Link -->
            <a href="https://notebooklm.google.com/notebook/bf82df95-6959-4b16-b38f-d17be86cb513/preview" 
               class="scripture-btn" 
               target="_blank" 
               rel="noopener noreferrer">
                Srimad Bhagavad Gita
            </a>

            <!-- Vishnu Sahasranama Link -->
            <a href="https://notebooklm.google.com/notebook/bfade740-80a8-47b2-8b61-fb9c3aef4f02/preview" 
               class="scripture-btn" 
               target="_blank" 
               rel="noopener noreferrer">
                Vishnu Sahasranama
            </a>
        </div>

        <footer>
            <p>Select a scripture to open its dedicated NotebookLM workspace.</p>
        </footer>
    </div>

</body>
</html>
